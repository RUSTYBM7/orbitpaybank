name: Build iOS (unsigned) — macOS runner

# Produces an unsigned iOS build (Xcode archive, .app, .ipa, dSYM, source map,
# logs, and metadata) on a macOS runner. The user signs the artifacts themselves.
#
# Why macOS-only: iOS apps can only be compiled with Xcode (xcodebuild), which
# only runs on macOS. Linux / Windows runners cannot produce iOS artifacts.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push to main when ios/ or app/ changes
#
# No Apple Developer account is required for the BUILD step. The user will
# perform `codesign` / `xcodebuild -exportArchive` themselves with their own
# signing certificate and provisioning profile.

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'Bundle identifier (default from app.json)'
        required: false
        type: string
        default: ''
      configuration:
        description: 'Build configuration'
        required: true
        type: choice
        default: 'Release'
        options:
          - Debug
          - Release
      package_as_ipa:
        description: 'Also produce an unsigned .ipa'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'ios/**'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/build-ios-unsigned.yml'

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build unsigned iOS artifacts
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      BUNDLE_ID: ${{ github.event.inputs.bundle_id || 'com.rustybm.orbitpaybank' }}
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      PACKAGE_IPA: ${{ github.event.inputs.package_as_ipa || 'true' }}
      SCHEME: orbitpaybank
      WORKSPACE: ios/orbitpaybank.xcworkspace
      PROJECT: ios/orbitpaybank.xcodeproj
      ARCHIVE_PATH: build/orbitpaybank.xcarchive
      EXPORT_PATH: build/export
      ARTIFACTS_DIR: build/artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document
          pod --version

      - name: Run expo prebuild (idempotent — regenerates ios/ if missing)
        run: npx expo prebuild --platform ios --no-install --clean
        continue-on-error: false

      - name: Run pod install
        working-directory: ios
        run: |
          pod install --repo-update
          ls -la Pods | head -20

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/**/*.swift', 'ios/**/*.m', 'ios/**/*.h', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Bundle JS for release
        run: |
          mkdir -p build/jsbundle
          npx expo export:embed \
            --platform ios \
            --dev false \
            --bundle-output build/jsbundle/main.jsbundle \
            --assets-dest build/jsbundle/assets \
            --sourcemap-output build/jsbundle/main.jsbundle.map

      - name: Build (unsigned, any device + simulator slices)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_BITCODE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
            ONLY_ACTIVE_ARCH=NO \
            build | tee build/xcodebuild-build.log
        env:
          RCT_NO_LAUNCH_PACKAGER: '1'

      - name: Build for simulator (so users can also run in iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build/xcodebuild-simulator.log

      - name: Create .xcarchive (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
            archive | tee build/xcodebuild-archive.log
        env:
          RCT_NO_LAUNCH_PACKAGER: '1'

      - name: Locate the .app bundle
        id: locate-app
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -path "*Release-iphoneos*" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app found in build/DerivedData"
            find build/DerivedData -name "*.app" -type d | head -10
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"

      - name: Generate ExportOptions.plist (unsigned)
        run: |
          cat > ios/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          PLIST
          cat ios/ExportOptions.plist

      - name: Package unsigned .ipa (Payload/.app)
        if: env.PACKAGE_IPA == 'true'
        run: |
          set -e
          APP_PATH="${{ steps.locate-app.outputs.app_path }}"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          /usr/bin/zip -r "orbitpaybank-unsigned.ipa" Payload >/dev/null
          ls -lh orbitpaybank-unsigned.ipa

      - name: Collect artifacts
        run: |
          mkdir -p "$ARTIFACTS_DIR"
          # .app
          APP_PATH="${{ steps.locate-app.outputs.app_path }}"
          cp -R "$APP_PATH" "$ARTIFACTS_DIR/orbitpaybank.app"
          # .xcarchive
          if [ -d "$ARCHIVE_PATH" ]; then
            cp -R "$ARCHIVE_PATH" "$ARTIFACTS_DIR/orbitpaybank.xcarchive"
          fi
          # .ipa (if produced)
          if [ -f build/orbitpaybank-unsigned.ipa ]; then
            cp build/orbitpaybank-unsigned.ipa "$ARTIFACTS_DIR/"
          fi
          # dSYM
          find build/DerivedData -name "*.dSYM" -type d -exec cp -R {} "$ARTIFACTS_DIR/" \; || true
          # JS bundle + source map
          mkdir -p "$ARTIFACTS_DIR/jsbundle"
          cp -R build/jsbundle/. "$ARTIFACTS_DIR/jsbundle/" 2>/dev/null || true
          # Logs
          mkdir -p "$ARTIFACTS_DIR/logs"
          cp build/*.log "$ARTIFACTS_DIR/logs/" 2>/dev/null || true
          # Project files
          cp -R ios "$ARTIFACTS_DIR/ios-source" 2>/dev/null || true
          # Build manifest + release metadata
          cat > "$ARTIFACTS_DIR/build-manifest.json" <<JSON
          {
            "platform": "ios",
            "configuration": "${{ env.CONFIGURATION }}",
            "scheme": "${{ env.SCHEME }}",
            "bundle_id": "${{ env.BUNDLE_ID }}",
            "code_signing": "disabled",
            "artifact_set": [
              "orbitpaybank.app",
              "orbitpaybank.xcarchive",
              "orbitpaybank-unsigned.ipa",
              "*.dSYM",
              "jsbundle/main.jsbundle",
              "jsbundle/main.jsbundle.map",
              "logs/"
            ],
            "build_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          cat > "$ARTIFACTS_DIR/release-metadata.json" <<JSON
          {
            "app_name": "orbitpaybank",
            "app_version": "$(node -p "require('./package.json').version")",
            "sdk_version": "$(node -p "require('./package.json').dependencies.expo || 'n/a'")",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_sha": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}",
            "runner": "macos-latest"
          }
          JSON
          echo "===== artifact inventory ====="
          find "$ARTIFACTS_DIR" -maxdepth 3 -type f -o -type d | head -40
          echo "===== sizes ====="
          du -sh "$ARTIFACTS_DIR"/* 2>/dev/null

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbitpaybank-ios-unsigned
          path: build/artifacts
          if-no-files-found: error
          retention-days: 30

      - name: Publish build summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | ${{ env.BUNDLE_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration | ${{ env.CONFIGURATION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scheme | ${{ env.SCHEME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | macos-latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Code signing | DISABLED (unsigned) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to sign the artifacts locally" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# After downloading the artifact zip, extract and sign:' >> $GITHUB_STEP_SUMMARY
          echo 'unzip orbitpaybank-ios-unsigned.zip' >> $GITHUB_STEP_SUMMARY
          echo 'cd orbitpaybank-ios-unsigned' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Sign the .app with your certificate' >> $GITHUB_STEP_SUMMARY
          echo 'codesign --force --sign "Apple Development: YOUR NAME (TEAMID)" \\' >> $GITHUB_STEP_SUMMARY
          echo '  --entitlements ios-source/orbitpaybank/orbitpaybank.entitlements \\' >> $GITHUB_STEP_SUMMARY
          echo '  orbitpaybank.app' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Re-package signed .ipa' >> $GITHUB_STEP_SUMMARY
          echo 'rm -rf Payload && mkdir Payload && cp -R orbitpaybank.app Payload/' >> $GITHUB_STEP_SUMMARY
          echo 'zip -r orbitpaybank-signed.ipa Payload' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
