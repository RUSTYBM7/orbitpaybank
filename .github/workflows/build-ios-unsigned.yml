name: Build + sign iOS — macOS runner

# Produces a SIGNED iOS .ipa (using the repo's APPLE_P12 + APPLE_MOBILEPROVISION
# secrets) and uploads the signed .ipa + .app + .xcarchive + dSYM + JS bundle
# + logs + manifest. Runs on macos-latest — no Apple Developer Portal login
# required at runtime.
#
# Triggers:
#   - workflow_dispatch (manual, with configuration + ipa toggle)
#   - push to main when ios/ or app/ changes

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        type: choice
        default: 'Release'
        options:
          - Debug
          - Release
      sign:
        description: 'Sign the build'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'ios/**'
      - 'app.json'
      - 'package.json'
      - '.github/workflows/build-ios-unsigned.yml'

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build + sign iOS
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      SCHEME: orbitpaybank
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}
      SHOULD_SIGN: ${{ github.event.inputs.sign || 'true' }}
      BUNDLE_ID: Q6SJUT5K5D.com.xl.MyXL.Giant-staging
      WORKSPACE: ios/orbitpaybank.xcworkspace
      PROJECT: ios/orbitpaybank.xcodeproj
      ARCHIVE_PATH: build/orbitpaybank.xcarchive
      EXPORT_PATH: build/export
      ARTIFACTS_DIR: build/artifacts
      KEYCHAIN_NAME: orbitpay-build.keychain
      KEYCHAIN_PASSWORD: orbitpay-temporary-keychain-pw

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document
          pod --version

      - name: Run expo prebuild (idempotent)
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Restore bundle ID to match provisioning profile
        run: |
          # expo prebuild may overwrite the bundle ID in the Xcode project.
          # Re-apply the one matching the .mobileprovision.
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/orbitpaybank/Info.plist 2>/dev/null || true
          # Force the bundle ID in the .pbxproj
          sed -i '' "s|PRODUCT_BUNDLE_IDENTIFIER = .*|PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};|g" ios/orbitpaybank.xcodeproj/project.pbxproj
          grep -c "$BUNDLE_ID" ios/orbitpaybank.xcodeproj/project.pbxproj && echo "bundle id patched"

      - name: Run pod install
        working-directory: ios
        run: |
          pod install --repo-update
          ls -la Pods | head -20

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: build/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/**/*.swift', 'ios/**/*.m', 'ios/**/*.h', 'ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Bundle JS for release
        run: |
          mkdir -p build/jsbundle
          npx expo export:embed \
            --platform ios \
            --dev false \
            --bundle-output build/jsbundle/main.jsbundle \
            --assets-dest build/jsbundle/assets \
            --sourcemap-output build/jsbundle/main.jsbundle.map

      - name: Decode signing assets from secrets
        if: env.SHOULD_SIGN == 'true'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # .p12
          echo "${{ secrets.APPLE_P12_BASE64 }}" | base64 --decode > /tmp/cert.p12
          # .mobileprovision
          echo "${{ secrets.APPLE_MOBILEPROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Q6SJUT5K5D.mobileprovision
          # verify
          ls -la /tmp/cert.p12 ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up temporary keychain + import cert
        if: env.SHOULD_SIGN == 'true'
        run: |
          # Create a fresh keychain so we don't pollute the runner's default
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          # Make it the default for this build so codesign finds the identity
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          # Import the .p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "${{ secrets.APPLE_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          # Verify the identity is now visible
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

      - name: Archive (unsigned or signed)
        run: |
          set -o pipefail
          if [ "$SHOULD_SIGN" = "true" ]; then
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build/DerivedData \
              -archivePath "$ARCHIVE_PATH" \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              CODE_SIGN_STYLE=Manual \
              PROVISIONING_PROFILE_SPECIFIER="MyXL-UniversalDist" \
              DEVELOPMENT_TEAM=Q6SJUT5K5D \
              DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
              archive | tee build/xcodebuild-archive.log
          else
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build/DerivedData \
              -archivePath "$ARCHIVE_PATH" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
              archive | tee build/xcodebuild-archive.log
          fi
        env:
          RCT_NO_LAUNCH_PACKAGER: '1'

      - name: Build (for .app + dSYM)
        run: |
          set -o pipefail
          if [ "$SHOULD_SIGN" = "true" ]; then
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              CODE_SIGN_STYLE=Manual \
              PROVISIONING_PROFILE_SPECIFIER="MyXL-UniversalDist" \
              DEVELOPMENT_TEAM=Q6SJUT5K5D \
              DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
              ONLY_ACTIVE_ARCH=NO \
              build | tee build/xcodebuild-build.log
          else
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -derivedDataPath build/DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              ONLY_ACTIVE_ARCH=NO \
              build | tee build/xcodebuild-build.log
          fi
        env:
          RCT_NO_LAUNCH_PACKAGER: '1'

      - name: Locate the .app bundle
        id: locate-app
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -path "*${CONFIGURATION}-iphoneos*" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app found"
            find build/DerivedData -name "*.app" -type d | head -10
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found .app at: $APP_PATH"

      - name: Verify code signature
        if: env.SHOULD_SIGN == 'true'
        run: |
          APP_PATH="${{ steps.locate-app.outputs.app_path }}"
          codesign -dv --verbose=2 "$APP_PATH" 2>&1 | head -20
          echo "---"
          codesign --verify --verbose=2 "$APP_PATH" 2>&1

      - name: Package signed .ipa (via xcodebuild -exportArchive)
        if: env.SHOULD_SIGN == 'true'
        run: |
          set -o pipefail
          mkdir -p "$EXPORT_PATH"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ios/ExportOptions.plist
          ls -lh "$EXPORT_PATH"

      - name: Package .ipa (Payload/.app zip, fallback if exportArchive fails)
        run: |
          set -e
          APP_PATH="${{ steps.locate-app.outputs.app_path }}"
          if [ ! -f "$EXPORT_PATH/orbitpaybank.ipa" ]; then
            echo "exportArchive didn't produce .ipa, falling back to Payload zip"
            mkdir -p build/Payload
            cp -R "$APP_PATH" build/Payload/
            (cd build && /usr/bin/zip -r orbitpaybank.ipa Payload >/dev/null)
            mkdir -p "$EXPORT_PATH"
            cp build/orbitpaybank.ipa "$EXPORT_PATH/orbitpaybank.ipa"
          fi
          ls -lh "$EXPORT_PATH"

      - name: Build for simulator (so .app also runs in Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build/xcodebuild-simulator.log

      - name: Collect artifacts
        run: |
          mkdir -p "$ARTIFACTS_DIR"
          # .app
          APP_PATH="${{ steps.locate-app.outputs.app_path }}"
          cp -R "$APP_PATH" "$ARTIFACTS_DIR/orbitpaybank.app"
          # .xcarchive
          if [ -d "$ARCHIVE_PATH" ]; then
            cp -R "$ARCHIVE_PATH" "$ARTIFACTS_DIR/orbitpaybank.xcarchive"
          fi
          # .ipa (signed or unsigned)
          if [ -f "$EXPORT_PATH/orbitpaybank.ipa" ]; then
            cp "$EXPORT_PATH/orbitpaybank.ipa" "$ARTIFACTS_DIR/orbitpaybank.ipa"
          fi
          # dSYM
          find build/DerivedData -name "*.dSYM" -type d -exec cp -R {} "$ARTIFACTS_DIR/" \; || true
          # JS bundle + source map
          mkdir -p "$ARTIFACTS_DIR/jsbundle"
          cp -R build/jsbundle/. "$ARTIFACTS_DIR/jsbundle/" 2>/dev/null || true
          # Logs
          mkdir -p "$ARTIFACTS_DIR/logs"
          cp build/*.log "$ARTIFACTS_DIR/logs/" 2>/dev/null || true
          # Project files
          cp -R ios "$ARTIFACTS_DIR/ios-source" 2>/dev/null || true
          # Build manifest + release metadata
          cat > "$ARTIFACTS_DIR/build-manifest.json" <<JSON
          {
            "platform": "ios",
            "configuration": "${{ env.CONFIGURATION }}",
            "scheme": "${{ env.SCHEME }}",
            "bundle_id": "${{ env.BUNDLE_ID }}",
            "signed": $([ "$SHOULD_SIGN" = "true" ] && echo true || echo false),
            "artifact_set": [
              "orbitpaybank.app",
              "orbitpaybank.xcarchive",
              "orbitpaybank.ipa",
              "*.dSYM",
              "jsbundle/main.jsbundle",
              "jsbundle/main.jsbundle.map",
              "logs/"
            ],
            "build_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          cat > "$ARTIFACTS_DIR/release-metadata.json" <<JSON
          {
            "app_name": "OrbitPay",
            "app_version": "$(node -p "require('./package.json').version")",
            "sdk_version": "$(node -p "require('./package.json').dependencies.expo || 'n/a'")",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_sha": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}",
            "runner": "macos-latest",
            "signing": {
              "team_id": "Q6SJUT5K5D",
              "profile_name": "MyXL-UniversalDist",
              "entitlements": "aps-environment, associated-domains, keychain-access-groups"
            }
          }
          JSON
          echo "===== artifact inventory ====="
          find "$ARTIFACTS_DIR" -maxdepth 3 \( -type f -o -type d \) | head -40
          echo "===== sizes ====="
          du -sh "$ARTIFACTS_DIR"/* 2>/dev/null

      - name: Clean up keychain
        if: always() && env.SHOULD_SIGN == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          rm -f /tmp/cert.p12

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbitpaybank-ios-signed
          path: build/artifacts
          if-no-files-found: error
          retention-days: 30

      - name: Publish build summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | ${{ env.BUNDLE_ID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Configuration | ${{ env.CONFIGURATION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scheme | ${{ env.SCHEME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Team ID | Q6SJUT5K5D |" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | MyXL-UniversalDist |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ${{ env.SHOULD_SIGN }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner | macos-latest |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to install" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# 1. Download the orbitpaybank-ios-signed artifact (zip)' >> $GITHUB_STEP_SUMMARY
          echo 'unzip orbitpaybank-ios-signed.zip' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# 2a. Install on a registered device (TestFlight / ad-hoc):' >> $GITHUB_STEP_SUMMARY
          echo 'xcrun devicectl device install app orbitpaybank-ios-signed/orbitpaybank.ipa' >> $GITHUB_STEP_SUMMARY
          echo '# OR:' >> $GITHUB_STEP_SUMMARY
          echo 'ios-deploy --bundle orbitpaybank-ios-signed/orbitpaybank.app' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# 2b. Run in iOS Simulator (unsigned simulator .app also produced):' >> $GITHUB_STEP_SUMMARY
          echo 'xcrun simctl install booted orbitpaybank-ios-signed/orbitpaybank.app' >> $GITHUB_STEP_SUMMARY
          echo 'xcrun simctl launch booted com.xl.MyXL.Giant-staging' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
